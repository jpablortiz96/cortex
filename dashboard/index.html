<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTEX — Autonomous Trading Desk</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        :root {
            --bg:#060610;--bg2:#0c0c1a;--card:#0f0f1f;--elev:#141428;--border:#1a1a35;--border2:#2a2a50;
            --txt:#e8e8f0;--txt2:#8888a0;--dim:#555570;
            --blue:#4488ff;--cyan:#00d4aa;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#a855f7;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Mono',monospace;overflow-x:hidden}
        .font-d{font-family:'Space Grotesk',sans-serif}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(0,212,170,.15)}50%{box-shadow:0 0 20px rgba(0,212,170,.3)}}
        @keyframes vetoShake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-2px)}20%,40%,60%,80%{transform:translateX(2px)}}
        @keyframes progressBar{from{width:0%}to{width:100%}}
        @keyframes borderGlow{0%,100%{border-color:rgba(0,212,170,.2)}50%{border-color:rgba(0,212,170,.5)}}
        .pulse{animation:pulse 1.5s ease-in-out infinite}
        .slideUp{animation:slideUp .3s ease-out}
        .spin{animation:spin 1s linear infinite}
        .glowPulse{animation:glowPulse 2s ease-in-out infinite}
        .vetoShake{animation:vetoShake .5s ease-in-out}
        .borderGlow{animation:borderGlow 2s ease-in-out infinite}
        .scanline{position:fixed;top:0;left:0;right:0;height:2px;z-index:100;pointer-events:none;
            background:linear-gradient(90deg,transparent,rgba(68,136,255,.03),transparent);
            animation:scanline 8s linear infinite}
        @keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
        .noise{position:fixed;inset:0;z-index:99;pointer-events:none;opacity:.012;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
    </style>
</head>
<body>
<div class="scanline"></div>
<div class="noise"></div>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
 
const AGENTS={
    strategist:{name:'STRATEGIST',icon:'◈',color:'var(--blue)',desc:'Market Analysis & Signal Generation'},
    risk_officer:{name:'RISK OFFICER',icon:'◆',color:'var(--amber)',desc:'Risk Evaluation & Trade Gating'},
    executor:{name:'EXECUTOR',icon:'◇',color:'var(--purple)',desc:'Order Execution via Kraken CLI'},
    compliance:{name:'COMPLIANCE',icon:'□',color:'var(--green)',desc:'Portfolio Health & Circuit Breakers'},
    auditor:{name:'AUDITOR',icon:'⬡',color:'var(--cyan)',desc:'On-Chain Verification (ERC-8004)'},
};
 
const card={background:'var(--card)',border:'1px solid var(--border)',borderRadius:6};
const label={fontSize:10,fontWeight:500,color:'var(--dim)',letterSpacing:'0.08em',textTransform:'uppercase'};
 
/* ── Spinner ── */
function Spinner({size=14,color='var(--blue)'}){
    return <span className="spin" style={{display:'inline-block',width:size,height:size,border:`2px solid ${color}30`,borderTopColor:color,borderRadius:'50%'}}/>;
}
 
/* ── Cycle Loading Bar ── */
function CycleProgress({active,step}){
    if(!active) return null;
    const steps=['Analyzing...','Evaluating Risk...','Executing...','Checking Compliance...','Recording On-Chain...'];
    const pct = step!=null ? ((step+1)/5)*100 : 0;
    return(
        <div style={{...card,padding:'8px 14px',marginBottom:10,borderColor:'var(--blue)',background:'rgba(68,136,255,.03)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <Spinner color="var(--blue)"/>
                    <span style={{fontSize:11,color:'var(--blue)',fontWeight:600}}>{steps[step]||'Processing cycle...'}</span>
                </div>
                <span style={{fontSize:10,color:'var(--dim)'}}>{Math.round(pct)}%</span>
            </div>
            <div style={{height:3,background:'#111',borderRadius:2,overflow:'hidden'}}>
                <div style={{height:'100%',background:'var(--blue)',borderRadius:2,width:`${pct}%`,transition:'width .5s ease',boxShadow:'0 0 8px rgba(68,136,255,.3)'}}/>
            </div>
        </div>
    );
}
 
/* ── Status Indicator ── */
function StatusDot({status,color}){
    const s=status==='thinking'||status==='acting';
    return(
        <span style={{display:'inline-flex',alignItems:'center',gap:4}}>
            {s?<Spinner size={10} color={color}/>:<span style={{width:6,height:6,borderRadius:'50%',background:'#444'}}/>}
            <span style={{fontSize:9,color:s?color:'#555',letterSpacing:'.1em'}}>{status.toUpperCase()}</span>
        </span>
    );
}
 
/* ── Agent Row ── */
function AgentRow({role,status,lastEvent}){
    const a=AGENTS[role];if(!a)return null;
    const active=status==='thinking'||status==='acting';
    return(
        <div style={{...card,padding:'10px 12px',display:'flex',alignItems:'center',gap:12,
            borderColor:active?a.color:'var(--border)',boxShadow:active?`0 0 15px ${a.color}20`:'none',transition:'all .3s'}}>
            <span style={{fontSize:16,color:a.color,width:20,textAlign:'center',fontWeight:700}}>{a.icon}</span>
            <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span className="font-d" style={{fontSize:12,fontWeight:600,color:active?a.color:'var(--txt)',letterSpacing:'.02em'}}>{a.name}</span>
                    <StatusDot status={status} color={a.color}/>
                </div>
                {lastEvent?<p style={{fontSize:10,color:'var(--txt2)',marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{lastEvent}</p>
                :<p style={{fontSize:10,color:'var(--dim)',marginTop:2}}>{a.desc}</p>}
            </div>
        </div>
    );
}
 
/* ── Market Card ── */
function MarketCard({asset,data}){
    if(!data)return(
        <div style={{...card,padding:12,flex:1}}><span className="font-d" style={{fontSize:14,color:'#333'}}>{asset}</span>
            <div style={{marginTop:6,height:24,background:'#111',borderRadius:3,width:'60%'}}/>
        </div>
    );
    const up=data.change_24h_pct>=0;
    const rsiHot=data.rsi_14>70;const rsiCold=data.rsi_14<30;
    const signal=data.prism_signal;const score=data.prism_net_score;
    const sigColor=signal?.includes('bullish')?'var(--green)':signal?.includes('bearish')?'var(--red)':'var(--dim)';
    return(
        <div style={{...card,padding:12,flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span className="font-d" style={{fontSize:14,fontWeight:700,color:'#fff'}}>{asset}</span>
                <span style={{fontSize:11,fontWeight:600,color:up?'var(--green)':'var(--red)',
                    background:up?'rgba(34,197,94,.08)':'rgba(239,68,68,.08)',padding:'2px 6px',borderRadius:3}}>
                    {up?'▲':'▼'} {Math.abs(data.change_24h_pct).toFixed(2)}%</span>
            </div>
            <span className="font-d" style={{fontSize:22,fontWeight:700,color:'#fff',letterSpacing:'-0.02em'}}>
                ${data.price?.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
            <div style={{display:'flex',gap:12,marginTop:4}}>
                <div><span style={{fontSize:9,color:'var(--dim)'}}>RSI </span>
                    <span style={{fontSize:12,fontWeight:600,color:rsiHot?'var(--red)':rsiCold?'var(--green)':'var(--txt)'}}>{data.rsi_14}</span>
                    {rsiHot&&<span style={{fontSize:8,color:'var(--red)',marginLeft:3}}>OVERBOUGHT</span>}
                    {rsiCold&&<span style={{fontSize:8,color:'var(--green)',marginLeft:3}}>OVERSOLD</span>}
                </div>
                <div><span style={{fontSize:9,color:'var(--dim)'}}>VOL </span><span style={{fontSize:12,color:'var(--txt2)'}}>{data.volatility_24h}%</span></div>
            </div>
            {signal&&(
                <div style={{marginTop:6,display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:8,fontWeight:700,color:'#000',background:sigColor,padding:'1px 5px',borderRadius:2,letterSpacing:'.05em'}}>
                        AI {signal.replace('_',' ').toUpperCase()}
                    </span>
                    {score!=null&&<span style={{fontSize:10,color:sigColor,fontWeight:600}}>score {score>=0?'+':''}{score}</span>}
                </div>
            )}
        </div>
    );
}
 
/* ── Pipeline ── */
function Pipeline({currentFlow,cycleActive}){
    const steps=[
        {key:'proposal',label:'ANALYZE',agent:'strategist'},
        {key:'risk',label:'RISK CHECK',agent:'risk_officer'},
        {key:'execute',label:'EXECUTE',agent:'executor'},
        {key:'compliance',label:'COMPLY',agent:'compliance'},
        {key:'audit',label:'ON-CHAIN',agent:'auditor'},
    ];
    const veto=currentFlow==='vetoed';
    return(
        <div style={{...card,padding:'12px 16px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <span style={label}>TRADE FLOW PIPELINE</span>
                {veto&&<span className="vetoShake" style={{fontSize:11,fontWeight:700,color:'var(--red)',
                    background:'rgba(239,68,68,.1)',padding:'2px 10px',borderRadius:3,border:'1px solid rgba(239,68,68,.3)'}}>⊘ TRADE VETOED</span>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:0}}>
                {steps.map((step,i)=>{
                    const ag=AGENTS[step.agent];
                    const isActive=currentFlow===step.key;
                    const isDone=steps.findIndex(s=>s.key===currentFlow)>i;
                    const isVetoed=veto&&step.key==='risk';
                    const vetoedAfter=veto&&i>1;
                    const dotColor=isVetoed?'var(--red)':isActive?ag.color:isDone?'var(--green)':'#333';
                    return(
                        <React.Fragment key={step.key}>
                            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,opacity:vetoedAfter?.2:1,transition:'opacity .3s'}}>
                                <div style={{width:36,height:36,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                                    border:`2px solid ${dotColor}`,background:isActive||isVetoed?dotColor+'15':'transparent',
                                    boxShadow:isActive?`0 0 14px ${ag.color}30`:'none',transition:'all .3s',transform:isActive?'scale(1.15)':'scale(1)'}}>
                                    {isActive&&!isVetoed?<Spinner size={14} color={ag.color}/>:
                                    <span style={{fontSize:isVetoed?14:13,color:dotColor}}>{isVetoed?'⊘':ag.icon}</span>}
                                </div>
                                <span style={{fontSize:8,fontWeight:600,letterSpacing:'.1em',
                                    color:isVetoed?'var(--red)':isActive?ag.color:isDone?'var(--green)':'#444'}}>
                                    {isVetoed?'VETOED':step.label}</span>
                            </div>
                            {i<steps.length-1&&<div style={{flex:1,height:1,margin:'0 2px',marginBottom:16,
                                background:isVetoed&&i>=1?'rgba(239,68,68,.3)':isDone?'rgba(34,197,94,.25)':'#1a1a35',transition:'background .5s'}}/>}
                        </React.Fragment>
                    );
                })}
            </div>
        </div>
    );
}
 
/* ── Portfolio ── */
function Portfolio({portfolio}){
    if(!portfolio)return null;
    const up=portfolio.total_pnl>=0;
    const exp=Math.min(portfolio.total_exposure_pct||0,100);
    const expC=exp>25?'var(--red)':exp>15?'var(--amber)':'var(--green)';
    return(
        <div style={{...card,padding:12}}>
            <div style={{...label,marginBottom:8}}>PORTFOLIO</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <div><div style={{fontSize:9,color:'var(--dim)'}}>VALUE</div>
                    <div className="font-d" style={{fontSize:20,fontWeight:700,color:'#fff'}}>${portfolio.total_value?.toLocaleString()}</div></div>
                <div><div style={{fontSize:9,color:'var(--dim)'}}>P&L</div>
                    <div className="font-d" style={{fontSize:20,fontWeight:700,color:up?'var(--green)':'var(--red)'}}>
                        {up?'+':''}{portfolio.total_pnl?.toFixed(2)}</div></div>
            </div>
            <div style={{marginTop:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontSize:9,color:'var(--dim)'}}>EXPOSURE</span>
                    <span style={{fontSize:11,fontWeight:600,color:expC}}>{portfolio.total_exposure_pct?.toFixed(1)}%</span>
                </div>
                <div style={{height:4,background:'#1a1a30',borderRadius:2,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${exp}%`,background:expC,borderRadius:2,transition:'all .5s',boxShadow:`0 0 6px ${expC}40`}}/></div>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:10,paddingTop:8,borderTop:'1px solid var(--border)'}}>
                <div style={{textAlign:'center'}}><div style={{fontSize:16,fontWeight:700,color:'#fff'}}>{portfolio.open_positions_count}</div><div style={{fontSize:8,color:'var(--dim)'}}>OPEN</div></div>
                <div style={{textAlign:'center'}}><div style={{fontSize:16,fontWeight:700,color:'#fff'}}>{portfolio.total_trades}</div><div style={{fontSize:8,color:'var(--dim)'}}>TRADES</div></div>
                <div style={{textAlign:'center'}}><div style={{fontSize:16,fontWeight:700,color:'#fff'}}>${portfolio.cash?.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div style={{fontSize:8,color:'var(--dim)'}}>CASH</div></div>
            </div>
        </div>
    );
}
 
/* ── ON-CHAIN PANEL (PROMINENT) ── */
function OnChainPanel({data}){
    const active=data.artifacts>0;
    const recording=data.recording;
    return(
        <div className={active?'glowPulse borderGlow':''} style={{...card,padding:14,
            borderColor:active?'rgba(0,212,170,.25)':'var(--border)',
            background:active?'rgba(0,212,170,.02)':'var(--card)',transition:'all .5s'}}>
            
            {/* Header */}
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
                <span style={{fontSize:14,color:'var(--cyan)'}}>⬡</span>
                <span style={{...label,color:'var(--cyan)',margin:0,fontSize:11}}>ON-CHAIN TRUST</span>
                <span style={{fontSize:9,padding:'2px 8px',borderRadius:3,marginLeft:'auto',fontWeight:600,
                    background:active?'rgba(0,212,170,.12)':'rgba(85,85,112,.08)',
                    color:active?'var(--cyan)':'var(--dim)',
                    border:`1px solid ${active?'rgba(0,212,170,.25)':'transparent'}`}}>
                    {active?'ERC-8004 LIVE':'DEPLOY TO ENABLE'}
                </span>
            </div>
 
            {/* Recording indicator */}
            {recording&&(
                <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',marginBottom:10,
                    background:'rgba(0,212,170,.05)',borderRadius:4,border:'1px solid rgba(0,212,170,.15)'}}>
                    <Spinner size={12} color="var(--cyan)"/>
                    <span style={{fontSize:11,color:'var(--cyan)',fontWeight:500}}>Recording to Ethereum Sepolia...</span>
                </div>
            )}
 
            {!active&&!recording?(
                <div style={{padding:'12px 0',textAlign:'center'}}>
                    <p style={{fontSize:11,color:'var(--txt2)'}}>Deploy ERC-8004 contracts to enable<br/>on-chain verification for every trade</p>
                    <p style={{fontSize:9,color:'#333',marginTop:6}}>Ethereum Sepolia Testnet</p>
                </div>
            ):(
                <div>
                    {/* Stats row */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
                        <div style={{background:'rgba(0,212,170,.05)',borderRadius:4,padding:'8px 10px',textAlign:'center'}}>
                            <div style={{fontSize:9,color:'var(--dim)',marginBottom:2}}>ARTIFACTS</div>
                            <div className="font-d" style={{fontSize:24,fontWeight:700,color:'var(--cyan)'}}>{data.artifacts}</div>
                        </div>
                        <div style={{background:'rgba(0,212,170,.05)',borderRadius:4,padding:'8px 10px',textAlign:'center'}}>
                            <div style={{fontSize:9,color:'var(--dim)',marginBottom:2}}>NETWORK</div>
                            <div style={{fontSize:11,fontWeight:600,color:'var(--cyan)',marginTop:4}}>SEPOLIA</div>
                            <div style={{fontSize:8,color:'var(--dim)'}}>Chain 11155111</div>
                        </div>
                    </div>
                    
                    {/* Transaction log */}
                    <div style={{...label,fontSize:9,marginBottom:6}}>RECENT TRANSACTIONS</div>
                    <div style={{maxHeight:120,overflow:'auto',borderRadius:4,background:'rgba(0,0,0,.2)',padding:6}}>
                        {data.txLog.length===0&&<p style={{fontSize:10,color:'var(--dim)',textAlign:'center',padding:8}}>No transactions yet</p>}
                        {data.txLog.slice(-8).map((tx,i)=>(
                            <div key={i} className="slideUp" style={{display:'flex',alignItems:'center',gap:6,padding:'4px 2px',
                                borderBottom:i<data.txLog.slice(-8).length-1?'1px solid rgba(255,255,255,.03)':'none'}}>
                                <span style={{width:5,height:5,borderRadius:'50%',background:'var(--cyan)',flexShrink:0,
                                    boxShadow:'0 0 4px rgba(0,212,170,.3)'}}/>
                                <span style={{fontSize:10,color:'var(--txt2)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                                    {tx.tx_hash}
                                </span>
                                {tx.explorer_link&&(
                                    <a href={tx.explorer_link} target="_blank" rel="noopener" 
                                        style={{fontSize:9,color:'var(--cyan)',textDecoration:'none',padding:'1px 5px',
                                            background:'rgba(0,212,170,.08)',borderRadius:2,border:'1px solid rgba(0,212,170,.15)',
                                            whiteSpace:'nowrap'}}>
                                        View ↗
                                    </a>
                                )}
                            </div>
                        ))}
                    </div>
 
                    {/* Contract links */}
                    <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid rgba(0,212,170,.1)'}}>
                        <div style={{fontSize:9,color:'var(--dim)',marginBottom:4}}>VERIFIED CONTRACTS</div>
                        <a href="https://sepolia.etherscan.io/address/0x108571d9bC12197a8c8E78C4A6eC30C424643FB0#code" 
                            target="_blank" rel="noopener" style={{fontSize:9,color:'var(--cyan)',textDecoration:'none',display:'block',marginBottom:2}}>
                            AgentRegistry ↗</a>
                        <a href="https://sepolia.etherscan.io/address/0x4f2529D5D38836189408726B18bDFeDe87BeBDD9#code"
                            target="_blank" rel="noopener" style={{fontSize:9,color:'var(--cyan)',textDecoration:'none',display:'block'}}>
                            ValidationRegistry ↗</a>
                    </div>
                </div>
            )}
        </div>
    );
}
 
/* ── Event Feed ── */
function EventFeed({events}){
    const ref=useRef(null);
    useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[events]);
    const getStyle=(e)=>{
        const t=e.event_type;
        if(t==='risk_assessment')return e.data?.decision==='VETOED'?{icon:'⊘',color:'var(--red)',bg:'rgba(239,68,68,.06)',bdr:'rgba(239,68,68,.25)'}:{icon:'✓',color:'var(--green)',bg:'rgba(34,197,94,.04)',bdr:'rgba(34,197,94,.15)'};
        if(t==='trade_proposal')return{icon:'◈',color:'var(--blue)',bg:'rgba(68,136,255,.04)',bdr:'rgba(68,136,255,.15)'};
        if(t==='trade_execution')return{icon:'◇',color:'var(--purple)',bg:'rgba(168,85,247,.04)',bdr:'rgba(168,85,247,.15)'};
        if(t==='compliance_check')return{icon:'□',color:'var(--green)',bg:'rgba(34,197,94,.04)',bdr:'rgba(34,197,94,.15)'};
        if(t==='audit_log')return{icon:'⬡',color:'var(--cyan)',bg:'rgba(0,212,170,.04)',bdr:'rgba(0,212,170,.15)'};
        return{icon:'·',color:'var(--dim)',bg:'transparent',bdr:'var(--border)'};
    };
    const fmt=(e)=>{
        const d=e.data||{};
        switch(e.event_type){
            case 'trade_proposal':return `PROPOSE ${d.side} ${d.asset} · $${d.size_usd} · CONF ${(d.confidence*100).toFixed(0)}%`;
            case 'risk_assessment':return `${d.decision} — ${d.reasoning?.substring(0,140)}`;
            case 'trade_execution':return d.success?`FILLED @ $${d.executed_price?.toLocaleString()} · SLIP ${d.slippage_bps?.toFixed(1)}bps · FEE $${d.fees?.toFixed(2)}`:'SKIPPED — vetoed';
            case 'compliance_check':return d.circuit_breaker_triggered?'⊘ CIRCUIT BREAKER':!d.all_clear?`ALERT: ${d.alerts?.join(', ')}`:`CLEAR · EXP ${d.total_exposure_pct?.toFixed(1)}%`;
            case 'audit_log':return `${d.artifacts_recorded} validation artifacts → Ethereum Sepolia`;
            default:return JSON.stringify(d).substring(0,100);
        }
    };
    return(
        <div style={{...card,display:'flex',flexDirection:'column',height:'100%'}}>
            <div style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between'}}>
                <span style={label}>EVENT FEED</span>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{width:5,height:5,borderRadius:'50%',background:events.length>0?'var(--green)':'#333'}} className={events.length>0?'pulse':''}/>
                    <span style={{fontSize:9,color:'var(--dim)'}}>{events.length}</span>
                </div>
            </div>
            <div ref={ref} style={{flex:1,overflow:'auto',padding:6}}>
                {events.length===0&&<div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8}}>
                    <span style={{fontSize:28,opacity:.15}}>◈</span>
                    <span style={{fontSize:11,color:'var(--dim)'}}>Awaiting first cycle</span>
                    <span style={{fontSize:9,color:'#333'}}>Press CYCLE or AUTO to begin trading</span>
                </div>}
                {events.map((ev,i)=>{
                    const s=getStyle(ev);const isVeto=ev.event_type==='risk_assessment'&&ev.data?.decision==='VETOED';
                    return(<div key={ev.id||i} className="slideUp" style={{padding:'7px 10px',marginBottom:3,borderRadius:4,borderLeft:`2px solid ${s.bdr}`,background:s.bg}}>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                            <span style={{fontSize:isVeto?14:11,color:s.color,fontWeight:700}}>{s.icon}</span>
                            <span style={{fontSize:10,fontWeight:600,color:s.color}}>{AGENTS[ev.agent]?.name||ev.agent}</span>
                            <span style={{fontSize:9,color:'#333',marginLeft:'auto'}}>{ev.timestamp?.split('T')[1]?.substring(0,8)}</span>
                        </div>
                        <p style={{fontSize:10,color:isVeto?'var(--red)':'var(--txt2)',marginTop:3,lineHeight:1.4,fontWeight:isVeto?600:400}}>{fmt(ev)}</p>
                    </div>);
                })}
            </div>
        </div>
    );
}
 
/* ── Connection ── */
function ConnBadge({status}){
    const s={connected:{c:'var(--green)',t:'LIVE'},connecting:{c:'var(--amber)',t:'SYNC'},disconnected:{c:'var(--red)',t:'OFFLINE'}};
    const st=s[status]||s.disconnected;
    return(<span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 8px',borderRadius:3,
        background:st.c+'12',border:`1px solid ${st.c}25`}}>
        {status==='connecting'?<Spinner size={8} color={st.c}/>:<span style={{width:5,height:5,borderRadius:'50%',background:st.c}}/>}
        <span style={{fontSize:9,fontWeight:600,color:st.c,letterSpacing:'.08em'}}>{st.t}</span>
    </span>);
}
 
/* ── DEMO DATA ── */
const DEMO_MARKET={timestamp:new Date().toISOString(),source:'demo',assets:{
    BTC:{price:71298.80,change_24h_pct:-0.87,rsi_14:54.9,volatility_24h:6.53,prism_signal:'bullish',prism_net_score:1},
    ETH:{price:2216.39,change_24h_pct:-1.05,rsi_14:53.2,volatility_24h:8.73,prism_signal:'bullish',prism_net_score:1},
    SOL:{price:83.16,change_24h_pct:-2.79,rsi_14:48.1,volatility_24h:9.88,prism_signal:'bullish',prism_net_score:1}}};
const DEMO_EVENTS=[
    {id:'d1',event_type:'trade_proposal',agent:'strategist',timestamp:'2026-04-07T14:30:12',data:{side:'LONG',asset:'BTC',size_usd:400,confidence:0.72}},
    {id:'d2',event_type:'risk_assessment',agent:'risk_officer',timestamp:'2026-04-07T14:30:17',data:{decision:'APPROVED',reasoning:'Trade meets all risk parameters. Position size within $500 limit. Risk/reward ratio is attractive at current RSI levels.',risk_score:4}},
    {id:'d3',event_type:'trade_execution',agent:'executor',timestamp:'2026-04-07T14:30:17',data:{success:true,executed_price:71326.58,slippage_bps:3.9,fees:0.54,proposal_id:'d1'}},
    {id:'d4',event_type:'compliance_check',agent:'compliance',timestamp:'2026-04-07T14:30:20',data:{all_clear:true,total_exposure_pct:4.0,alerts:[]}},
    {id:'d5',event_type:'audit_log',agent:'auditor',timestamp:'2026-04-07T14:30:22',data:{artifacts_recorded:3,tx_hashes:['df0ed2642e652675...','e50ce4cbe524c0fd...'],explorer_links:['https://sepolia.etherscan.io/tx/0xdf0ed2642e652675','https://sepolia.etherscan.io/tx/0xe50ce4cbe524c0fd']}},
];
const DEMO_PORTFOLIO={total_value:9999.46,total_pnl:0,total_exposure_pct:4.0,open_positions_count:1,total_trades:1,cash:9599,circuit_breaker_active:false};
 
/* ── APP ── */
function App(){
    const [ws,setWs]=useState('disconnected');
    const [portfolio,setPortfolio]=useState(null);
    const [market,setMarket]=useState(null);
    const [events,setEvents]=useState([]);
    const [statuses,setStatuses]=useState({strategist:'idle',risk_officer:'idle',executor:'idle',compliance:'idle',auditor:'idle'});
    const [flow,setFlow]=useState(null);
    const [running,setRunning]=useState(false);
    const [cd,setCd]=useState(null);
    const [last,setLast]=useState({});
    const [chain,setChain]=useState({artifacts:0,txLog:[],recording:false});
    const [cycleStep,setCycleStep]=useState(null);
    const [cycleActive,setCycleActive]=useState(false);
    const [isDemo,setIsDemo]=useState(false);
    const wsRef=useRef(null);
 
    const backendUrl = window.location.hostname==='localhost'?'ws://localhost:8000/ws'
        : window.location.hostname.includes('vercel')?'wss://web-production-df8ac.up.railway.app/ws'
        : `wss://${window.location.host}/ws`;
 
    const connect=useCallback(()=>{
        setWs('connecting');
        const w=new WebSocket(backendUrl);
        w.onopen=()=>{setWs('connected');wsRef.current=w;setIsDemo(false);};
        w.onclose=()=>{setWs('disconnected');wsRef.current=null;
            // Load demo data after 3s if can't connect
            setTimeout(()=>{
                if(!wsRef.current){
                    setIsDemo(true);setMarket(DEMO_MARKET);setEvents(DEMO_EVENTS);setPortfolio(DEMO_PORTFOLIO);
                    setChain({artifacts:3,txLog:DEMO_EVENTS[4].data.tx_hashes.map((h,i)=>({tx_hash:h,explorer_link:DEMO_EVENTS[4].data.explorer_links[i]})),recording:false});
                }
            },3000);
            setTimeout(connect,5000);
        };
        w.onerror=()=>{setWs('disconnected');};
        w.onmessage=(m)=>handle(JSON.parse(m.data));
    },[]);
 
    const stepMap={trade_proposal:0,risk_assessment:1,trade_execution:2,compliance_check:3,audit_log:4};
 
    const handle=useCallback((m)=>{
        switch(m.type){
            case 'init':setPortfolio(m.data.portfolio);if(m.data.events)setEvents(m.data.events);break;
            case 'market_data':setMarket(m.data);break;
            case 'agent_event':
                const e=m.data;setEvents(p=>[...p,e]);
                setStatuses(p=>({...p,[e.agent]:'acting'}));
                setTimeout(()=>setStatuses(p=>({...p,[e.agent]:'idle'})),2500);
                setCycleStep(stepMap[e.event_type]??null);setCycleActive(true);
                if(e.event_type==='trade_proposal'){setFlow('proposal');setLast(p=>({...p,strategist:`${e.data.side} ${e.data.asset} $${e.data.size_usd}`}));}
                if(e.event_type==='risk_assessment'){
                    if(e.data.decision==='VETOED'){setFlow('vetoed');setLast(p=>({...p,risk_officer:'⊘ VETOED — '+e.data.reasoning?.substring(0,60)}));}
                    else{setFlow('risk');setLast(p=>({...p,risk_officer:'✓ APPROVED — Risk '+e.data.risk_score+'/10'}));}
                }
                if(e.event_type==='trade_execution'){setFlow('execute');if(e.data.success)setLast(p=>({...p,executor:`FILLED @ $${e.data.executed_price?.toLocaleString()}`}));}
                if(e.event_type==='compliance_check'){setFlow('compliance');setLast(p=>({...p,compliance:e.data.all_clear?'✓ ALL CLEAR':'⚠ ALERT'}));}
                if(e.event_type==='audit_log'){
                    setFlow('audit');setLast(p=>({...p,auditor:`${e.data.artifacts_recorded} artifacts → chain`}));
                    setChain(p=>({...p,artifacts:p.artifacts+(e.data.artifacts_recorded||0),recording:false,
                        txLog:[...p.txLog,...(e.data.tx_hashes||[]).map((h,i)=>({tx_hash:h,explorer_link:e.data.explorer_links?.[i]||''}))]}));
                    setTimeout(()=>{setCycleActive(false);setCycleStep(null);},2000);
                }
                // Show recording state for auditor
                if(e.event_type==='compliance_check'&&e.data.all_clear!==undefined){
                    setChain(p=>({...p,recording:true}));
                }
                break;
            case 'portfolio_update':setPortfolio(m.data);break;
            case 'system':setRunning(m.data.running??running);break;
            case 'countdown':setCd(m.data.seconds);break;
            case 'cycle_start':setCd(null);setFlow(null);setCycleActive(true);setCycleStep(0);break;
            case 'cycle_complete':setTimeout(()=>{setFlow(null);setCycleActive(false);setCycleStep(null);},3000);break;
        }
    },[running]);
 
    useEffect(()=>{connect();},[connect]);
    const send=(a,p={})=>{if(wsRef.current?.readyState===WebSocket.OPEN){wsRef.current.send(JSON.stringify({action:a,...p}));if(a==='cycle'){setCycleActive(true);setCycleStep(0);}}};
 
    return(
        <div style={{minHeight:'100vh',padding:16,maxWidth:1480,margin:'0 auto',position:'relative',zIndex:1}}>
            {/* Header */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
                <div>
                    <h1 className="font-d" style={{fontSize:22,fontWeight:700,color:'#fff',margin:0}}>
                        <span style={{color:'var(--blue)'}}>CORTEX</span>
                        <span style={{color:'var(--dim)',fontSize:13,fontWeight:400,marginLeft:10}}>Autonomous Trading Desk</span>
                    </h1>
                    <p style={{fontSize:9,color:'#333',marginTop:2,letterSpacing:'.08em'}}>ERC-8004 PROTOCOL · KRAKEN CLI · MULTI-AGENT ARCHITECTURE · ETHEREUM SEPOLIA</p>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <ConnBadge status={isDemo?'disconnected':ws}/>
                    {isDemo&&<span style={{fontSize:9,color:'var(--amber)',background:'rgba(245,158,11,.08)',padding:'2px 8px',borderRadius:3}}>DEMO MODE</span>}
                    {cd&&<span style={{fontSize:10,color:'var(--dim)'}}>NEXT {cd}s</span>}
                    <button onClick={()=>send('cycle')} disabled={running||ws!=='connected'||isDemo}
                        style={{padding:'5px 14px',borderRadius:4,fontSize:10,fontWeight:600,fontFamily:'IBM Plex Mono',
                            letterSpacing:'.06em',cursor:'pointer',border:'1px solid rgba(68,136,255,.3)',
                            background:cycleActive?'rgba(68,136,255,.15)':'rgba(68,136,255,.08)',color:'var(--blue)',
                            opacity:running||ws!=='connected'||isDemo?.3:1}}>
                        {cycleActive?'◌ RUNNING':'▶ CYCLE'}
                    </button>
                    <button onClick={()=>running?send('stop'):send('start',{cycles:10,delay:15})} disabled={ws!=='connected'||isDemo}
                        style={{padding:'5px 14px',borderRadius:4,fontSize:10,fontWeight:600,fontFamily:'IBM Plex Mono',
                            letterSpacing:'.06em',cursor:'pointer',
                            border:`1px solid ${running?'rgba(239,68,68,.3)':'rgba(34,197,94,.3)'}`,
                            background:running?'rgba(239,68,68,.08)':'rgba(34,197,94,.08)',
                            color:running?'var(--red)':'var(--green)',
                            opacity:ws!=='connected'||isDemo?.3:1}}>
                        {running?'⏹ HALT':'▶ AUTO'}
                    </button>
                </div>
            </div>
 
            {/* Market */}
            <div style={{display:'flex',gap:10,marginBottom:8}}>
                {market?.assets?Object.entries(market.assets).map(([a,d])=><MarketCard key={a} asset={a} data={d}/>)
                :['BTC','ETH','SOL'].map(a=><div key={a} style={{...card,padding:12,flex:1}}><span className="font-d" style={{fontSize:14,color:'#333'}}>{a}</span><div style={{marginTop:6,height:24,background:'#111',borderRadius:3,width:'60%'}}/></div>)}
            </div>
 
            {/* Loading bar */}
            <CycleProgress active={cycleActive} step={cycleStep}/>
 
            {/* Pipeline */}
            <div style={{marginBottom:8}}><Pipeline currentFlow={flow} cycleActive={cycleActive}/></div>
 
            {/* Main Grid: 3 columns */}
            <div style={{display:'grid',gridTemplateColumns:'280px 1fr 300px',gap:10,height:'calc(100vh - 340px)',minHeight:380}}>
                <div style={{display:'flex',flexDirection:'column',gap:6,overflow:'auto'}}>
                    <span style={{...label,paddingLeft:2}}>TRADING DESK</span>
                    {Object.keys(AGENTS).map(r=><AgentRow key={r} role={r} status={statuses[r]} lastEvent={last[r]}/>)}
                </div>
                <div><EventFeed events={events}/></div>
                <div style={{display:'flex',flexDirection:'column',gap:8,overflow:'auto'}}>
                    <Portfolio portfolio={portfolio}/>
                    <OnChainPanel data={chain}/>
                </div>
            </div>
 
            {/* Footer */}
            <div style={{textAlign:'center',marginTop:8,padding:'6px 0',borderTop:'1px solid #111'}}>
                <span style={{fontSize:8,color:'#2a2a40',letterSpacing:'.1em'}}>CORTEX v1.0 · AI TRADING AGENTS HACKATHON 2026 · LABLAB.AI</span>
            </div>
        </div>
    );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
